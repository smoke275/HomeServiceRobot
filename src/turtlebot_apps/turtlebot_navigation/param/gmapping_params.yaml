base_frame: base_footprint
odom_frame: odom

map_update_interval: 0.5        # Publish map every 0.5s (was 2.0)
maxUrange: 5.5
maxRange: 8.0
sigma: 0.05
kernelSize: 5                   # Search kernel (wider to find best alignment)
lstep: 0.02                     # Finer linear search step
astep: 0.02                     # Finer angular search step
iterations: 10                  # More iterations to converge on correct alignment
lsigma: 0.05                    # Tighter likelihood (was 0.075)
ogain: 3.0
lskip: 0
minimumScore: 0                 # Accept all scans (simulation has clean odometry/sensors)

# Motion model noise (low = trust odometry more)
srr: 0.005
srt: 0.01
str: 0.005
stt: 0.01

# Update thresholds (lower = more frequent updates)
linearUpdate: 0.05              # Update every 5cm (was 0.2)
angularUpdate: 0.05             # Update every ~3 degrees (was 0.2)
temporalUpdate: 0.2             # Fallback time update (was 0.5)
resampleThreshold: 0.5

# Number of particles
particles: 100                   # reduced from 300 to free CPU for navigation

# Map bounds
xmin: -10.0
ymin: -10.0
xmax: 10.0
ymax: 10.0

# Map resolution in meters/cell (0.05 = 5cm)
delta: 0.05

llsamplerange: 0.005            # Finer likelihood sampling (was 0.01)
llsamplestep: 0.005             # (was 0.01)
lasamplerange: 0.003            # (was 0.005)
lasamplestep: 0.003             # (was 0.005)
