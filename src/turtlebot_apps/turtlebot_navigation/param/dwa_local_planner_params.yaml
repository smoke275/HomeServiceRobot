DWAPlannerROS:

# Robot Configuration Parameters - Kobuki (slow for accurate SLAM)
  max_vel_x: 0.1  # slow linear speed for better map quality
  min_vel_x: 0.0 

  max_vel_y: 0.0  # diff drive robot
  min_vel_y: 0.0  # diff drive robot

  max_trans_vel: 0.1 # match max_vel_x
  min_trans_vel: 0.05  # this is the min trans velocity when there is negligible rotational velocity
  trans_stopped_vel: 0.05

  # Warning!
  #   do not set min_trans_vel to 0.0 otherwise dwa will always think translational velocities
  #   are non-negligible and small in place rotational velocities will be created.

  max_rot_vel: 0.5  # wider range so DWA can find valid trajectories
  min_rot_vel: 0.05  # allow very slow rotation
  rot_stopped_vel: 0.05
  
  acc_lim_x: 0.5
  acc_lim_theta: 1.0
  acc_lim_y: 0.0      # diff drive robot

# Goal Tolerance Parameters
  yaw_goal_tolerance: 0.5   # don't need perfect heading at frontiers
  xy_goal_tolerance: 0.3    # consider arrived within 30cm (was 0.15)
  # latch_xy_goal_tolerance: false

# Forward Simulation Parameters
  sim_time: 3.0       # longer lookahead for slow robot (was 1.0)
  vx_samples: 10      # more linear samples (was 6)
  vy_samples: 1       # diff drive robot, there is only one sample
  vtheta_samples: 30  # more angular samples (was 20)

# Trajectory Scoring Parameters
  path_distance_bias: 32.0      # less rigid path following (was 64.0)
  goal_distance_bias: 24.0
  occdist_scale: 0.5
  forward_point_distance: 0.325
  stop_time_buffer: 0.2
  scaling_speed: 0.25
  max_scaling_factor: 0.2

# Oscillation Prevention Parameters
  oscillation_reset_dist: 0.05  # 0.05   - how far to travel before resetting oscillation flags

# Debugging
  publish_traj_pc : true
  publish_cost_grid_pc: true
  global_frame_id: odom


# Differential-drive robot configuration - necessary?
#  holonomic_robot: false
